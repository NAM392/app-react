<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Argentina flag: light blue - white - light blue -->
  <rect width="512" height="170" y="0" fill="#75AADB"/>
  <rect width="512" height="172" y="170" fill="#FFFFFF"/>
  <rect width="512" height="170" y="342" fill="#75AADB"/>
  <!-- Sun in the center -->
  <g transform="translate(256,256)">
    <circle cx="0" cy="0" r="60" fill="#F6C358"/>
    <!-- simple rays -->
    <g stroke="#F6C358" stroke-width="8">
      <line x1="0" y1="-100" x2="0" y2="-60"/>
      <line x1="0" y1="60" x2="0" y2="100"/>
      <line x1="-100" y1="0" x2="-60" y2="0"/>
      <line x1="60" y1="0" x2="100" y2="0"/>
      <line x1="-70" y1="-70" x2="-45" y2="-45"/>
      <line x1="45" y1="45" x2="70" y2="70"/>
      <line x1="-70" y1="70" x2="-45" y2="45"/>
      <line x1="45" y1="-45" x2="70" y2="-70"/>
    </g>
  </g>
</svg> 